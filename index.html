<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз по базам данных</title>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            height: 100vh;
            color: #3c3c3c;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .progress-bar-container {
            flex-grow: 1;
            background-color: #e5e5e5;
            border-radius: 10px;
            height: 16px;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #58cc02;
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 30px;
            line-height: 1.4;
            text-align: center;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }
        .option {
            border: 2px solid #e5e5e5;
            border-bottom-width: 4px;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s ease;
            user-select: none;
        }
        .option:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }
        .option.selected {
            border-color: #84d8ff;
            background-color: #ddf4ff;
            color: #1cb0f6;
        }
        .option.correct {
            border-color: #58cc02;
            background-color: #d7ffb8;
            color: #58a700;
        }
        .option.wrong {
            border-color: #ea2b2b;
            background-color: #ffdfe0;
            color: #ea2b2b;
        }
        .hidden {
            display: none !important;
        }
        #result-screen {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .score-text {
            font-size: 24px;
            font-weight: bold;
            color: #58cc02;
            margin-bottom: 30px;
        }
        .btn {
            width: 100%;
            background-color: #58cc02;
            color: white;
            border: 0;
            border-bottom: 4px solid #58a700;
            border-radius: 16px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            margin-top: 20px;
        }
        .btn:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        .question-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="header">
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="question-header" id="question-header"></div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Урок завершён!</h2>
        <div class="score-text" id="score-text"></div>
        <button class="btn" onclick="startGame()">Пройти заново</button>
    </div>
</div>

<script>
    const rawData = [
        { q: "Какая платформа является самой частой для хранения корпоративных данных?", c: "Базы данных", w: ["Локальные текстовые файлы", "Графические редакторы", "Операционные системы"] },
        { q: "Для каких систем обработки транзакций используются базы данных?", c: "Которые создают операционные данные, такие как заказы на продажу", w: ["Которые архивируют старый код", "Которые управляют тактовой частотой процессора", "Которые форматируют жесткие диски"] },
        { q: "Какое определение базы данных дано в Гражданском кодексе РФ?", c: "Представленная в объективной форме совокупность самостоятельных материалов, систематизированных для поиска с помощью компьютера", w: ["Набор сырых текстовых документов в файловой системе", "Программа для автоматического перевода естественного языка", "Таблица, содержащая исключительно финансовые записи компании"] },
        { q: "Что, помимо набора хранимых данных, включает в себя база данных (БД) согласно тексту?", c: "Их метаданные", w: ["Исходный код СУБД", "Драйверы внешних устройств", "Графические интерфейсы пользователей"] },
        { q: "Что образуют базы данных, собирая предметно-ориентированную и хорошо структурированную информацию?", c: "Основу информационных систем", w: ["Локальные архивы документов", "Среду разработки приложений", "Сетевые протоколы передачи данных"] },
        { q: "Какая пара примеров баз данных приведена в конце первого раздела текста?", c: "Телефонный справочник и репозиторий", w: ["Графический файл и текстовый документ", "Операционная система и драйвер диска", "Веб-страница и почтовый сервер"] },
        { q: "Что позволяют приложению указывать логические операции с базой данных?", c: "Нужный контент", w: ["Физическое расположение файлов на диске", "Скорость передачи данных по сети", "Метод шифрования паролей"] },
        { q: "Что определяют физические операции с базой данных?", c: "Как к данным следует обращаться, а затем выполняют задачу", w: ["Логическую структуру связей", "Язык программирования клиентского приложения", "Права доступа системного администратора"] },
        { q: "В математическом описании отношения в тексте, чем является символ n?", c: "Степень отношения R", w: ["Мощность отношения", "Кардинальное число", "Количество доменов в таблице"] },
        { q: "Из каких частей состоит реляционная модель данных (РМД)?", c: "Из структурной, целостной и манипуляционной", w: ["Из клиентской, серверной и сетевой", "Из текстовой, графической и числовой", "Из системной, прикладной и конфигурационной"] },
        { q: "Что, согласно Дейту, является основой структуры реляционной модели данных?", c: "П-арное отношение", w: ["Двумерный массив чисел", "Иерархическое дерево каталогов", "Текстовый файл с разделителями"] },
        { q: "Как называется набор атрибутов отношения, перечисленных в столбце объекта?", c: "Домен", w: ["Кортеж", "Мощность", "Степень"] },
        { q: "Чему равна степень отношения «Товары», если оно содержит 3 атрибута?", c: "3", w: ["1", "2", "4"] },
        { q: "Чему равна мощность отношения «Товары», если оно содержит 4 кортежа?", c: "4", w: ["3", "12", "0"] },
        { q: "Какое минимальное количество атрибутов должно иметь отношение согласно характеристикам Дейта?", c: "Хотя бы один атрибут", w: ["Два атрибута", "Ровно три атрибута", "Количество атрибутов ограничено нулем"] },
        { q: "Что такое нормализация согласно тексту учебника?", c: "Процесс организации данных в базе данных", w: ["Процесс резервного копирования системных файлов", "Процесс шифрования каналов связи", "Процесс компиляции исходного кода T-SQL"] },
        { q: "Что такое первичный ключ согласно определению в тексте?", c: "Атрибут или группа атрибутов таблицы, однозначно идентифицирующих каждый из её кортежей", w: ["Поле, принимающее исключительно NULL-значения", "Индекс, используемый для связи с внешними текстовыми файлами", "Системный пароль администратора базы данных"] },
        { q: "Какими свойствами должен обладать первичный ключ?", c: "Должен быть уникальным, обязательным и постоянным", w: ["Должен быть изменчивым, числовым и коротким", "Должен быть пустым, индексируемым и скрытым", "Должен быть текстовым, длинным и открытым"] },
        { q: "Что такое альтернативный ключ?", c: "Атрибут или группа атрибутов таблицы, отличных от первичного ключа, но уникально идентифицирующих каждый из его кортежей", w: ["Ключ, используемый для шифрования резервных копий", "Поле, автоматически принимающее пустые значения", "Внешний ключ в родительской таблице"] },
        { q: "Что представляет собой NULL-значение согласно тексту?", c: "Маркер, показывающий, что значение атрибута отсутствует", w: ["Числовой ноль для финансовых расчетов", "Пустую текстовую строку фиксированной длины", "Команду удаления записи из таблицы"] },
        { q: "Какая таблица является дочерней (зависимой) на схеме организации связи?", c: "Студенты", w: ["Группы", "Поставщики", "Договоры"] },
        { q: "Какие операции относятся к операциям манипулирования данными, вызывающим нарушение ограничений целостности?", c: "Вставка (INSERT), обновление (UPDATE), удаление (DELETE)", w: ["Создание (CREATE), изменение (ALTER), уничтожение (DROP)", "Выборка (SELECT), соединение (JOIN), группировка (GROUP BY)", "Резервное копирование (BACKUP), восстановление (RESTORE)"] },
        { q: "Архитектурные особенности какой реляционной СУБД рассматриваются в тексте учебника?", c: "Microsoft SQL Server", w: ["Oracle Database", "PostgreSQL", "MySQL"] },
        { q: "Какой используемый диалект SQL характерен для СУБД MS SQL Server?", c: "Transact-SQL (T-SQL)", w: ["PL/SQL", "MySQL SQL", "PL/pgSQL"] },
        { q: "Какая бесплатная версия MS SQL Server используется в целях обучения?", c: "MS SQL Server Express", w: ["MS SQL Server Enterprise", "MS SQL Server Standard", "MS SQL Server Developer"] },
        { q: "Какая база данных является главной служебной БД всего сервера SQL Server?", c: "Master", w: ["Msdb", "Model", "Tempdb"] },
        { q: "Что такое язык T-SQL согласно тексту?", c: "Диалект SQL, применяемый в СУБД SQL Server", w: ["Язык разметки графических диаграмм баз данных", "Сетевой протокол аутентификации пользователей Windows", "Стандартный язык программирования веб-серверов"] },
        { q: "Что такое диаграмма БД согласно определению в тексте?", c: "Графическое представление таблиц БД с визуальным отображением связей между ними по внешним ключам", w: ["Скрипт на языке T-SQL, содержащий условные операторы", "Список предопределенных ролей уровня сервера", "Иерархическая структура системных баз данных"] },
        { q: "Что такое хранимая процедура (Stored Procedure) согласно тексту?", c: "Объект БД, представляющий собой набор SQL-инструкций, который компилируется один раз и хранится на сервере", w: ["Текстовый файл на диске клиентского компьютера", "Графическая схема данных, отображающая внешние ключи", "Системный макрос СУБД Access"] },
        { q: "Почему ответ при вызове хранимой процедуры является быстрым?", c: "Поскольку хранимые процедуры компилируются и хранятся на сервере заранее", w: ["Потому что она выполняется на стороне клиента", "Из-за автоматического удаления зависимых витрин данных", "Благодаря использованию технологии сырых файлов Excel"] },
        { q: "Для чего могут использоваться триггеры в качестве альтернативного метода?", c: "Для реализации ограничений ссылочной целостности", w: ["Для экспорта таблиц в текстовые файлы Excel", "Для визуального проектирования ER-диаграмм", "Для создания новых учетных записей пользователей"] },
        { q: "Для чего предназначено резервное копирование данных?", c: "Для создания копий данных в отдельной системе для восстановления их в результате сбоев, кражи или угроз", w: ["Для повышения производительности выполнения сложных запросов SELECT", "Для автоматического удаления избыточных кортежей", "Для обеспечения автономности клиентских приложений"] },
        { q: "Какая предопределенная роль уровня сервера позволяет выполнять любые действия на сервере SQL Server?", c: "sysadmin", w: ["serveradmin", "securityadmin", "public"] },
        { q: "Что нужно делать на регулярной основе для сведения к минимуму риска безвозвратной потери данных?", c: "Создавать резервные копии баз данных", w: ["Проводить повторную нормализацию таблиц", "Менять пароли администраторов", "Очищать системную базу данных Master"] },
        { q: "Какая инструкция языка T-SQL используется для создания копии базы данных?", c: "BACKUP DATABASE", w: ["CREATE DATABASE", "RESTORE DATABASE", "UPDATE DATABASE"] },
        { q: "Что является результатом этапа логического проектирования базы данных?", c: "Логическая модель данных", w: ["Концептуальная схема предметной области", "Физический файл базы данных", "Скрипт на языке T-SQL"] },
        { q: "Что такое физическое проектирование БД согласно тексту?", c: "Процесс преобразования логической модели данных в физическую модель БД", w: ["Процесс сбора требований у бизнес-аналитиков", "Графическое отображение таблиц фактов", "Создание резервной копии базы данных"] },
        { q: "Что такое сущность в концептуальном моделировании?", c: "Абстракция реально существующей совокупности объектов, процессов или явлений", w: ["Конкретная строка в таблице реляционной базы данных", "Локальный объект синоним в среде Management Studio", "Тип данных для хранения системного времени timestamp"] },
        { q: "Какая нотация упоминается в тексте применительно к синтаксису внешних ключей?", c: "IDEF1X", w: ["Чена", "Мартина", "UML"] },
        { q: "Какое свойство концепции ACID означает, что транзакция выполняется как цельная операция?", c: "Атомарность (Atomicity)", w: ["Согласованность (Consistency)", "Изоляция (Isolation)", "Долговечность (Durability)"] },
        { q: "Что гарантирует свойство «Долговечность» (Durability) концепции ACID?", c: "Если транзакция выполнена, результаты ее работы сохраняются в БД", w: ["База данных работает без резервного копирования", "Время выполнения сложного SQL-запроса мало", "Первичные ключи таблиц лишены изменений"] },
        { q: "Что имеет высший приоритет в OLTP-системах?", c: "Точность и целостность транзакций БД", w: ["Графический дизайн интерфейса клиентского приложения", "Использование сырых текстовых файлов", "Объем хранимых исторических данных"] },
        { q: "Что такое фантомное чтение (Phantom)?", c: "Проблемная ситуация, когда при повторном чтении одна и та же выборка дает разные множества строк", w: ["Чтение данных, удаленных триггером", "Запрос к таблице без первичного ключа", "Ситуация перекрытия результата транзакции"] },
        { q: "Сколько уровней изоляции транзакций различают в СУБД?", c: "Четыре уровня изоляции", w: ["Два уровня изоляции", "Три уровня изоляции", "Пять уровней изоляции"] },
        { q: "Какая концепция аналитической обработки данных была впервые описана Коддом в 1993 году?", c: "Концепция OLAP", w: ["Концепция ACID", "Концепция NewSQL", "Концепция IDEF1X"] },
        { q: "Что такое иерархия в структуре аналитической базы данных?", c: "Способ организации данных на разных уровнях агрегирования", w: ["Набор пар «ключ – значение» с динамической схемой", "Связь между родительской и дочерней таблицами", "Уровень изоляции транзакций"] },
        { q: "Какие две схемы моделирования многомерных данных используются в хранилищах?", c: "«Звезда» и «Снежинка»", w: ["«Сущность» и «Связь»", "«Иерархия» и «Идентифицирующее отношение»", "«Ключ» и «Значение»"] },
        { q: "Какая таблица в структуре типа «Звезда» сильно денормализована и содержит агрегированные данные?", c: "Таблица фактов", w: ["Консольная таблица", "Системная таблица Master", "Таблица измерений"] },
        { q: "Что такое витрина данных (Data mart) согласно тексту?", c: "Предметно-ориентированная БД, часть корпоративного хранилища", w: ["Локальная хеш-таблица", "Среда моделирования данных", "Временная область оперативной памяти"] },
        { q: "Какие признаки образуют основу определения больших данных в концепции «Гартнер»?", c: "Объем, скорость и вариативность", w: ["Ценность, достоверность и объем", "Масштабируемость, эффективность и отказоустойчивость", "Атомарность, согласованность и изолированность"] },
        { q: "В отличие от классических СУБД, какую альтернативную модель поддерживают системы NoSQL?", c: "Механизм BASE", w: ["Теорему HACE", "Модель MapReduce", "Схему «Снежинка»"] },
        { q: "Согласно теореме CAP, сколько свойств из трех возможных может одновременно иметь распределенная система?", c: "Только два свойства", w: ["Строго все три свойства", "Только одно свойство", "Ноль свойств"] },
        { q: "Какая бесплатная документоориентированная СУБД хранит данные в гибких JSON-подобных документах?", c: "MongoDB", w: ["Apache Cassandra", "Riak KV", "VoltDB"] },
        { q: "Какой минус официально приписывается модели вычислений MapReduce?", c: "Сложность программирования распределенных систем", w: ["Отсутствие шансов масштабирования", "Высокая стоимость оборудования", "Привязанность к одной таблице"] }
    ];

    const totalQuestions = 10;
    let quizData = [];
    let currentIndex = 0;
    let score = 0;
    let currentCorrectAnswer = '';
    let isProcessing = false;

    const questionHeader = document.getElementById('question-header');
    const optionsContainer = document.getElementById('options-container');
    const progressBar = document.getElementById('progress-bar');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreText = document.getElementById('score-text');
    const header = document.getElementById('header');

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
        quizData = shuffle([...rawData]).slice(0, totalQuestions);
        currentIndex = 0;
        score = 0;
        isProcessing = false;
        quizScreen.classList.remove('hidden');
        resultScreen.classList.add('hidden');
        header.classList.remove('hidden');
        updateProgress(0);
        loadQuestion();
    }

    function loadQuestion() {
        const currentItem = quizData[currentIndex];
        optionsContainer.innerHTML = '';
        isProcessing = false;

        questionHeader.innerHTML = `<h2>${currentItem.q}</h2>`;
        currentCorrectAnswer = currentItem.c;

        const optionsList = shuffle([currentItem.c, ...currentItem.w]);

        optionsList.forEach(value => {
            const div = document.createElement('div');
            div.className = 'option';
            div.dataset.value = value;
            div.textContent = value;
            div.onclick = () => selectOption(div);
            optionsContainer.appendChild(div);
        });
    }

    function selectOption(div) {
        if (isProcessing) return; 
        isProcessing = true;
        
        div.classList.add('selected');

        document.querySelectorAll('.option').forEach(el => {
            if (el.dataset.value === currentCorrectAnswer) {
                el.classList.add('correct');
            }
            const isWrongSelected = el.classList.contains('selected') && el.dataset.value !== currentCorrectAnswer;
            if (isWrongSelected) {
                el.classList.add('wrong');
            }
        });

        if (div.dataset.value === currentCorrectAnswer) {
            score++;
        }

        proceedToNext();
    }

    function proceedToNext() {
        updateProgress(((currentIndex + 1) / totalQuestions) * 100);
        
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < totalQuestions) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1500);
    }

    function updateProgress(value) {
        progressBar.style.width = `${value}%`;
    }

    function showResults() {
        quizScreen.classList.add('hidden');
        header.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        scoreText.textContent = `Твой результат: ${score} из ${totalQuestions}`;
    }

    startGame();
</script>
</body>
</html>
