<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз по базам данных</title>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            height: 100vh;
            color: #3c3c3c;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .progress-bar-container {
            flex-grow: 1;
            background-color: #e5e5e5;
            border-radius: 10px;
            height: 16px;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #58cc02;
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 30px;
            line-height: 1.4;
            text-align: center;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }
        .option {
            border: 2px solid #e5e5e5;
            border-bottom-width: 4px;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s ease;
            user-select: none;
        }
        .option:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }
        .option.selected {
            border-color: #84d8ff;
            background-color: #ddf4ff;
            color: #1cb0f6;
        }
        .option.correct {
            border-color: #58cc02;
            background-color: #d7ffb8;
            color: #58a700;
        }
        .option.wrong {
            border-color: #ea2b2b;
            background-color: #ffdfe0;
            color: #ea2b2b;
        }
        .hidden {
            display: none !important;
        }
        #result-screen {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .score-text {
            font-size: 24px;
            font-weight: bold;
            color: #58cc02;
            margin-bottom: 30px;
        }
        .btn {
            width: 100%;
            background-color: #58cc02;
            color: white;
            border: 0;
            border-bottom: 4px solid #58a700;
            border-radius: 16px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            margin-top: 20px;
        }
        .btn:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        .question-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="header">
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="question-header" id="question-header"></div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Урок завершён!</h2>
        <div class="score-text" id="score-text"></div>
        <button class="btn" onclick="startGame()">Пройти заново</button>
    </div>
</div>

<script>

        { q: "Какая пара примеров баз данных приведена в конце первого раздела?", c: "Телефонный справочник и репозиторий", w: ["Графический файл и текстовый документ", "Операционная система и драйвер диска", "Веб-страница и почтовый сервер"] },
        { q: "Что позволяют приложению указывать логические операции с базой данных?", c: "Нужный контент", w: ["Физическое расположение файлов на диске", "Скорость передачи данных по сети", "Метод шифрования паролей"] },
        { q: "Что определяют физические операции с базой данных?", c: "Как к данным следует обращаться, а затем выполняют задачу", w: ["Логическую структуру связей", "Язык программирования клиентского приложения", "Права доступа системного администратора"] },
        { q: "В математическом описании отношения, чем является символ n?", c: "Степень отношения R", w: ["Мощность отношения", "Кардинальное число", "Количество доменов в таблице"] },
        { q: "Из каких частей состоит реляционная модель данных (РМД)?", c: "Из структурной, целостной и манипуляционной", w: ["Из клиентской, серверной и сетевой", "Из текстовой, графической и числовой", "Из системной, прикладной и конфигурационной"] },

        { q: "Как называется набор атрибутов отношения, перечисленных в столбце объекта?", c: "Домен", w: ["Кортеж", "Мощность", "Степень"] },

    const totalQuestions = 10;
    let quizData = [];
    let currentIndex = 0;
    let score = 0;
    let currentCorrectAnswer = '';
    let isProcessing = false;

    const questionHeader = document.getElementById('question-header');
    const optionsContainer = document.getElementById('options-container');
    const progressBar = document.getElementById('progress-bar');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreText = document.getElementById('score-text');
    const header = document.getElementById('header');

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
        quizData = shuffle([...rawData]).slice(0, totalQuestions);
        currentIndex = 0;
        score = 0;
        isProcessing = false;
        quizScreen.classList.remove('hidden');
        resultScreen.classList.add('hidden');
        header.classList.remove('hidden');
        updateProgress(0);
        loadQuestion();
    }

    function loadQuestion() {
        const currentItem = quizData[currentIndex];
        optionsContainer.innerHTML = '';
        isProcessing = false;

        questionHeader.innerHTML = `<h2>${currentItem.q}</h2>`;
        currentCorrectAnswer = currentItem.c;

        const optionsList = shuffle([currentItem.c, ...currentItem.w]);

        optionsList.forEach(value => {
            const div = document.createElement('div');
            div.className = 'option';
            div.dataset.value = value;
            div.textContent = value;
            div.onclick = () => selectOption(div);
            optionsContainer.appendChild(div);
        });
    }

    function selectOption(div) {
        if (isProcessing) return; 
        isProcessing = true;
        
        div.classList.add('selected');

        document.querySelectorAll('.option').forEach(el => {
            if (el.dataset.value === currentCorrectAnswer) {
                el.classList.add('correct');
            }
            const isWrongSelected = el.classList.contains('selected') && el.dataset.value !== currentCorrectAnswer;
            if (isWrongSelected) {
                el.classList.add('wrong');
            }
        });

        if (div.dataset.value === currentCorrectAnswer) {
            score++;
        }

        proceedToNext();
    }

    function proceedToNext() {
        updateProgress(((currentIndex + 1) / totalQuestions) * 100);
        
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < totalQuestions) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1500);
    }

    function updateProgress(value) {
        progressBar.style.width = `${value}%`;
    }

    function showResults() {
        quizScreen.classList.add('hidden');
        header.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        scoreText.textContent = `Твой результат: ${score} из ${totalQuestions}`;
    }

    startGame();
</script>
